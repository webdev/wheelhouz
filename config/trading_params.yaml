# AGGRESSIVE WHEEL — targeting 40%+ annualized
# This is NOT conservative. You WILL have drawdowns. The edge is
# in recovery speed (close losers fast, reload into dips).
wheel:
  # Put selling
  put_target_delta: -0.30
  put_min_delta: -0.40
  put_max_delta: -0.15

  # Call selling
  call_target_delta: 0.30
  call_min_delta: 0.15
  call_max_delta: 0.40

  # DTE window
  min_dte: 21
  max_dte: 45
  sweet_spot_dte: 30

  # Premium thresholds
  min_yield_per_trade: 0.015
  min_annualized_yield: 0.15

  # IV filters
  min_iv_rank: 25
  preferred_iv_rank: 50
  iv_rank_override_on_dip: true

  # Profit management
  close_at_profit_pct: 0.50
  close_at_profit_pct_short_dte: 0.80
  close_and_reload_threshold: 0.40

  # Roll triggers
  roll_when_delta_exceeds: 0.45
  roll_min_net_credit: 0.25

signals:
  # Dip detection
  intraday_dip_threshold: -2.5
  multi_day_pullback_days: 3
  multi_day_pullback_pct: 5.0

  # Technical
  support_proximity_pct: 3.0
  oversold_rsi_threshold: 30

  # IV surface
  iv_rank_spike_threshold: 20
  skew_blowout_multiplier: 1.3
  term_structure_inversion: 1.05

  # Macro
  vix_fear_threshold: 25
  vix_change_threshold: 2.0

  # Earnings IV crush
  earnings_iv_crush_window_min: 5
  earnings_iv_crush_window_max: 15
  earnings_iv_crush_min_iv_rank: 65

sizing:
  # Conviction-based position sizing (% of NLV)
  high_conviction_pct: 0.04
  medium_conviction_pct: 0.02
  low_conviction_pct: 0.01

  # Signal strength thresholds
  high_conviction_strength: 70
  high_conviction_min_signals: 2
  medium_conviction_strength: 50

  # Scaling
  margin_cutback_threshold: 0.40
  max_new_trades_per_day: 5

portfolio:
  max_concentration_per_symbol: 0.10
  max_concentration_per_sector: 0.35
  adbe_target_concentration: 0.20
  max_margin_utilization: 0.55
  target_idle_capital: 0.10
  min_cash_reserve: 0.03

regime:
  # VIX thresholds for regime classification
  attack_vix_range: [18, 30]
  hold_vix_range: [14, 18]
  defend_vix_ceiling: 35
  crisis_vix: 40

  # Capital deployment targets by regime
  attack_target_deployed: 0.90
  hold_target_deployed: 0.70
  defend_target_deployed: 0.40

loss_management:
  # Loss stop multiples (of premium received)
  monthly_loss_stop: 2.0
  weekly_loss_stop: 1.5
  # Max portfolio drawdown before circuit breaker
  max_drawdown_pct: 0.12
